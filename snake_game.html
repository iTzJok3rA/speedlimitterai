<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لعبة الثعبان (Snake Game)</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #282c34;
            color: white;
            font-family: 'Arial', sans-serif;
        }

        h1 {
            margin-bottom: 20px;
        }

        #gameBoard {
            border: 10px solid #61dafb;
            background-color: #3e4451;
            display: grid;
            /* حجم اللوحة هو 20x20 مربع */
            grid-template-columns: repeat(20, 20px);
            grid-template-rows: repeat(20, 20px);
        }

        .snake {
            background-color: #4CAF50; /* لون الثعبان */
            border-radius: 3px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .food {
            background-color: #f44336; /* لون الطعام */
            border-radius: 50%;
            transform: scale(0.8);
        }

        #scoreBoard {
            margin-bottom: 15px;
            font-size: 2em;
            color: #61dafb;
        }

        #gameStatus {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            z-index: 10;
            display: none; /* مخفي في البداية */
        }

        #gameStatus button {
            padding: 10px 20px;
            margin-top: 20px;
            font-size: 1.2em;
            cursor: pointer;
            background-color: #61dafb;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>🐍 لعبة الثعبان الكلاسيكية</h1>
    <div id="scoreBoard">النقاط: <span id="score">0</span></div>
    
    <div id="gameBoard"></div>

    <div id="gameStatus">
        <h2 id="statusMessage">Game Over!</h2>
        <button onclick="startGame()">إعادة اللعب</button>
    </div>


    <script>
        // إعدادات اللعبة
        const BOARD_SIZE = 20;
        const TILE_SIZE = 20; // حجم المربع بالبكسل
        let gameBoard;
        let snake = [{ x: 10, y: 10 }]; // موقع الثعبان (نقطة البداية)
        let food = {}; // موقع الطعام
        let dx = 1; // اتجاه الحركة الأفقي (1 لليمين)
        let dy = 0; // اتجاه الحركة العمودي
        let score = 0;
        let gameInterval;
        let isPaused = true;

        // الحصول على عناصر DOM
        const gameBoardElement = document.getElementById('gameBoard');
        const scoreElement = document.getElementById('score');
        const statusElement = document.getElementById('gameStatus');
        const statusMessageElement = document.getElementById('statusMessage');

        // تهيئة اللوحة عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            setupBoard();
            document.addEventListener('keydown', changeDirection);
        });

        function setupBoard() {
            gameBoardElement.style.width = `${BOARD_SIZE * TILE_SIZE}px`;
            gameBoardElement.style.height = `${BOARD_SIZE * TILE_SIZE}px`;
            // إنشاء شبكة اللعبة (20x20) في CSS Grid
        }

        function startGame() {
            // إعادة تعيين المتغيرات
            snake = [{ x: 10, y: 10 }];
            dx = 1;
            dy = 0;
            score = 0;
            isPaused = false;
            scoreElement.textContent = score;
            statusElement.style.display = 'none';

            // إنشاء الطعام الجديد وتحديث اللوحة
            placeFood();
            drawGame();

            // بدء حلقة اللعبة (السرعة 150 ميلي ثانية)
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(moveSnake, 150);
        }

        function placeFood() {
            let newFoodPos;
            do {
                newFoodPos = {
                    x: Math.floor(Math.random() * BOARD_SIZE),
                    y: Math.floor(Math.random() * BOARD_SIZE)
                };
            } while (isSnakeCollision(newFoodPos)); // التأكد من أن الطعام لا يظهر على الثعبان
            food = newFoodPos;
        }

        function isSnakeCollision(pos) {
            return snake.some(segment => segment.x === pos.x && segment.y === pos.y);
        }


        // تحديث الاتجاه عند ضغط المفاتيح (مع منع الانعكاس المباشر 180 درجة)
        function changeDirection(event) {
            if (isPaused && event.keyCode !== 32) return; // لا تغيير في الاتجاه إذا كانت متوقفة باستثناء مفتاح المسافة

            const keyPressed = event.keyCode;
            let newDx = dx;
            let newDy = dy;

            switch(keyPressed) {
                case 37: // سهم يسار
                    newDx = -1; newDy = 0; break;
                case 38: // سهم أعلى
                    newDx = 0; newDy = -1; break;
                case 39: // سهم يمين
                    newDx = 1; newDy = 0; break;
                case 40: // سهم أسفل
                    newDx = 0; newDy = 1; break;
                case 32: // مسافة (للإيقاف المؤقت/البدء)
                    if (!gameInterval && !isPaused) { // إذا كانت متوقفة، ابدأ
                         startGame();
                    } else if (isPaused && gameInterval) { // إذا كانت قيد التشغيل ومتوقفة مؤقتاً، استأنف
                        isPaused = false;
                        gameInterval = setInterval(moveSnake, 150);
                        statusElement.style.display = 'none';
                    } else if (isPaused && !gameInterval) { // إذا كانت متوقفة بالكامل، ابدأ اللعبة
                         startGame();
                    }
                    return; // نخرج هنا لتجنب تطبيق التغيير في الحركة إذا كان مجرد إيقاف/تشغيل
            }

            // منع الانعكاس الفوري (مثلاً، من اليمين إلى اليسار)
            if ((newDx !== 0 && newDy !== 0) || (newDx === -dx && newDy === -dy)) return;

            dx = newDx;
            dy = newDy;
        }


        // دالة حركة الثعبان
        function moveSnake() {
            if (isPaused) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // 1. التحقق من الاصطدام بالجدار أو بنفسه
            if (head.x < 0 || head.x >= BOARD_SIZE || head.y < 0 || head.y >= BOARD_SIZE || isSnakeCollision(head)) {
                gameOver();
                return;
            }

            // إضافة رأس جديد
            snake.unshift(head);

            // 2. التحقق من أكل الطعام
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                placeFood(); // إنشاء طعام جديد
                // الثعبان لا يقصر طوله عند الأكل
            } else {
                snake.pop(); // إزالة الذيل إذا لم يأكل
            }

            // إعادة الرسم بعد الحركة
            drawGame();
        }

        // رسم حالة اللعبة على الشاشة
        function drawGame() {
            gameBoardElement.innerHTML = ''; // مسح اللوحة القديمة

            // 1. رسم الطعام
            const foodTile = document.createElement('div');
            foodTile.style.gridRowStart = food.y + 1;
            foodTile.style.gridColumnStart = food.x + 1;
            foodTile.classList.add('food');
            gameBoardElement.appendChild(foodTile);

            // 2. رسم الثعبان
            snake.forEach((segment, index) => {
                const snakeTile = document.createElement('div');
                snakeTile.style.gridRowStart = segment.y + 1;
                snakeTile.style.gridColumnStart = segment.x + 1;
                snakeTile.classList.add('snake');

                // يمكن تلوين الرأس بلون مختلف إذا أردنا
                if (index === 0) {
                    snakeTile.style.backgroundColor = '#38a169'; // لون رأس مميز
                }
                gameBoardElement.appendChild(snakeTile);
            });
        }

        function gameOver() {
            clearInterval(gameInterval);
            isPaused = true;
            statusMessageElement.textContent = `انتهت اللعبة! نقاطك النهائية: ${score}`;
            document.getElementById('gameStatus').style.display = 'block';
            // إعادة تعيين الزر ليصبح "إعادة اللعب"
            document.getElementById('gameStatus').querySelector('button').textContent = "إعادة اللعب";
        }

    </script>
</body>
</html>
